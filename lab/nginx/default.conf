# Two server blocks, one per target, both writing to the SAME access.log in nginx's
# predefined "combined" format — exactly what minisoc's access.log parser expects:
#   %h %l %u %t "%r" %>s %b "%{Referer}i" "%{User-Agent}i"
#
# The proxy logs the request line the *client* sent (with the full URL + query string),
# so attack payloads land in the log even when the upstream app rejects them. That is
# what minisoc's SQLi / directory-traversal / web-shell rules match on (url.original).

server {
    listen 80;
    server_name dvwa;
    access_log /var/log/nginx/access.log combined;

    location / {
        proxy_pass http://dvwa:80;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}

server {
    listen 81;
    server_name juiceshop;
    access_log /var/log/nginx/access.log combined;

    location / {
        proxy_pass http://juiceshop:3000;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}
