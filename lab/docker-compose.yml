# minisoc attack lab — vulnerable web targets behind a logging reverse proxy.
#
# Topology:
#   kali  ── HTTP ──>  proxy :80 ─> dvwa:80          (published on host :8080)
#                      proxy :81 ─> juiceshop:3000   (published on host :8081)
#   proxy writes a single combined-format access.log to ./logs/access.log,
#   which minisoc tails on the host:  minisoc watch lab/logs/access.log --source access.log
#
# Bring up:   docker compose -f lab/docker-compose.yml up -d
# Tear down:  docker compose -f lab/docker-compose.yml down

name: soclab

services:
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: soclab-dvwa
    networks: [soclab]
    restart: unless-stopped

  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: soclab-juiceshop
    networks: [soclab]
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: soclab-proxy
    depends_on: [dvwa, juiceshop]
    ports:
      - "8080:80"   # DVWA       -> http://localhost:8080
      - "8081:81"   # Juice Shop -> http://localhost:8081
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx          # access.log lands in ./lab/logs/ on the host
    networks: [soclab]
    restart: unless-stopped

  # Optional in-stack attacker. Skip this service if you already run your own Kali —
  # just put it on the soclab network, or attack the host's :8080 / :8081 ports.
  kali:
    image: kalilinux/kali-rolling:latest
    container_name: soclab-kali
    command: sleep infinity
    cap_add: [NET_RAW, NET_ADMIN]
    tty: true
    networks: [soclab]

networks:
  soclab:
    driver: bridge
