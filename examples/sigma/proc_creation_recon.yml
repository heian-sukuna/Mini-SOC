title: Suspicious Host Reconnaissance Commands
id: sigma-recon-commands
status: experimental
description: >
  Detects execution of common built-in host/network reconnaissance utilities, frequently
  run by an operator immediately after gaining a foothold.
references:
  - https://attack.mitre.org/techniques/T1059/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\whoami.exe'
      - '\net.exe'
      - '\net1.exe'
      - '\ipconfig.exe'
      - '\nltest.exe'
  condition: selection
level: medium
tags:
  - attack.t1059
  - attack.execution
falsepositives:
  - Administrative scripts and inventory tooling.
